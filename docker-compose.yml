services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ereklamo
      POSTGRES_USER: ereklamo
      POSTGRES_PASSWORD: ereklamo
    ports:
      - "5432:5432"
    volumes:
      - ereklamo-postgres-data:/var/lib/postgresql/data

volumes:
  ereklamo-postgres-data:
