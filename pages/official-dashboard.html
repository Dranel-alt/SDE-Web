<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Official Dashboard | e-Reklamo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .dash-header { background: var(--primary); color: #fff; padding: 20px 48px; font-size: 1.1rem; font-weight: 900; letter-spacing: 0.04em; text-transform: uppercase; }
    .dash-body { padding: 36px 48px; max-width: 1100px; margin: 0 auto; }
    .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 32px; }
    .table-section { background: #fff; border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; }
    .table-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px; }
    .table-header h3 { font-size: 1rem; font-weight: 800; }
    .table-controls { display: flex; gap: 10px; align-items: center; }
    .sort-select { padding: 7px 12px; border-radius: 8px; border: 1.5px solid var(--border); font-size: 0.82rem; font-family: inherit; font-weight: 600; cursor: pointer; }
    .action-btn { padding: 5px 12px; border-radius: 6px; font-size: 0.78rem; font-weight: 700; cursor: pointer; border: 1.5px solid var(--border); background: #fff; }
    .action-btn:hover { background: var(--light-gray); }
    .status-select { padding: 4px 8px; border-radius: 6px; border: 1.5px solid var(--border); font-size: 0.78rem; cursor: pointer; }
    .no-data { text-align:center; padding: 56px 24px; color: var(--text-light); }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <div class="dash-header">
    Barangay Issue Reporting and Tracking System
  </div>

  <div class="dash-body">
    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card green">
        <div><div class="stat-label">Open Issues</div><div class="stat-num" id="stat-open">0</div></div>
        <div class="stat-icon">⏰</div>
      </div>
      <div class="stat-card yellow">
        <div><div class="stat-label">In Progress</div><div class="stat-num" id="stat-progress">0</div></div>
        <div class="stat-icon">⏳</div>
      </div>
      <div class="stat-card blue">
        <div><div class="stat-label">Resolved</div><div class="stat-num" id="stat-resolved">0</div></div>
        <div class="stat-icon">✅</div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-section">
      <div class="table-header">
        <h3>Recent Reports</h3>
        <div class="table-controls">
          <div style="position:relative;">
            <span style="position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text-light); font-size:0.9rem;">🔍</span>
            <input class="form-control" id="dash-search" placeholder="Search..." style="padding-left:32px; width:200px; font-size:0.85rem; height:36px;" oninput="renderTable()"/>
          </div>
          <select class="sort-select" id="sort-by" onchange="renderTable()">
            <option value="date">By Date</option>
            <option value="priority">By Priority</option>
            <option value="status">By Status</option>
          </select>
        </div>
      </div>

      <div style="overflow-x:auto;">
        <table class="dash-table">
          <thead>
            <tr>
              <th>Report No.</th>
              <th>Complaint</th>
              <th>Status</th>
              <th>Priority</th>
              <th>Date Reported</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="dash-tbody"></tbody>
        </table>
        <div id="no-data" class="no-data" style="display:none;">
          <div style="font-size:2rem; margin-bottom:8px;">📭</div>
          No complaints found
        </div>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detail-modal" class="modal-overlay hidden">
    <div class="modal" style="max-width:580px; max-height:90vh; overflow-y:auto;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="font-size:1.2rem; font-weight:900;" id="modal-title">Complaint Details</h2>
        <button onclick="closeModal()" style="background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(--text-light);">✕</button>
      </div>
      <div id="modal-body"></div>
      <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">
        <select class="form-control" id="modal-status" style="flex:1;">
          <option value="Pending Review">Pending Review</option>
          <option value="Under Review">Under Review</option>
          <option value="In Progress">In Progress</option>
          <option value="Resolved">Resolved</option>
          <option value="Closed">Closed</option>
        </select>
        <button class="btn btn-primary" onclick="updateStatus()">Update Status</button>
      </div>
    </div>
  </div>

  <div id="footer"></div>
  <script src="../js/components.js"></script>
  <script>
    const STORAGE_KEY = 'ereklamo_complaints';
    let currentId = null;

    function getComplaints() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function saveComplaints(list) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    }

    function updateStats() {
      const list = getComplaints();
      document.getElementById('stat-open').textContent = list.filter(c => c.status === 'Pending Review' || c.status === 'Under Review').length;
      document.getElementById('stat-progress').textContent = list.filter(c => c.status === 'In Progress').length;
      document.getElementById('stat-resolved').textContent = list.filter(c => c.status === 'Resolved' || c.status === 'Closed').length;
    }

    function getPriorityBadge(urgency) {
      const map = { critical:'badge-critical', high:'badge-review', medium:'badge-progress', low:'badge-resolved' };
      return `<span class="badge ${map[urgency] || 'badge-pending'}">${urgency ? urgency.charAt(0).toUpperCase()+urgency.slice(1) : 'Normal'}</span>`;
    }

    function getStatusBadge(status) {
      const map = {
        'Pending Review': 'badge-pending',
        'Under Review': 'badge-review',
        'In Progress': 'badge-progress',
        'Resolved': 'badge-resolved',
        'Closed': 'badge-resolved'
      };
      return `<span class="badge ${map[status] || 'badge-pending'}">${status}</span>`;
    }

    function renderTable() {
      const list = getComplaints();
      const search = document.getElementById('dash-search').value.toLowerCase();
      const sortBy = document.getElementById('sort-by').value;
      const tbody = document.getElementById('dash-tbody');

      let filtered = list.filter(c =>
        !search || c.subject.toLowerCase().includes(search) ||
        c.category.toLowerCase().includes(search) || c.id.toLowerCase().includes(search)
      );

      filtered.sort((a, b) => {
        if (sortBy === 'priority') {
          const order = { critical:0, high:1, medium:2, low:3 };
          return (order[a.urgency]||4) - (order[b.urgency]||4);
        }
        if (sortBy === 'status') return a.status.localeCompare(b.status);
        return new Date(b.dateRaw) - new Date(a.dateRaw);
      });

      if (filtered.length === 0) {
        tbody.innerHTML = '';
        document.getElementById('no-data').style.display = 'block';
        return;
      }
      document.getElementById('no-data').style.display = 'none';

      tbody.innerHTML = filtered.map(c => `
        <tr>
          <td style="font-weight:700; font-size:0.82rem; color:var(--primary);">${c.id}</td>
          <td>
            <div style="font-weight:700; font-size:0.9rem;">${c.subject}</div>
            <div style="font-size:0.78rem; color:var(--text-light);">${c.category}</div>
          </td>
          <td>${getStatusBadge(c.status)}</td>
          <td>${getPriorityBadge(c.urgency)}</td>
          <td style="font-size:0.82rem; color:var(--text-light);">${c.date}</td>
          <td>
            <button class="action-btn" onclick="openModal('${c.id}')">View</button>
          </td>
        </tr>
      `).join('');
    }

    function openModal(id) {
      const list = getComplaints();
      const c = list.find(x => x.id === id);
      if (!c) return;
      currentId = id;

      document.getElementById('modal-title').textContent = c.subject;
      document.getElementById('modal-status').value = c.status;
      document.getElementById('modal-body').innerHTML = `
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
          <div><div style="font-size:0.75rem; color:var(--text-light); font-weight:700; text-transform:uppercase;">Report ID</div><div style="font-weight:700; color:var(--primary);">${c.id}</div></div>
          <div><div style="font-size:0.75rem; color:var(--text-light); font-weight:700; text-transform:uppercase;">Category</div><div>${c.category}</div></div>
          <div><div style="font-size:0.75rem; color:var(--text-light); font-weight:700; text-transform:uppercase;">Complainant</div><div>${c.firstName} ${c.lastName}</div></div>
          <div><div style="font-size:0.75rem; color:var(--text-light); font-weight:700; text-transform:uppercase;">Date Filed</div><div>${c.date}</div></div>
          <div><div style="font-size:0.75rem; color:var(--text-light); font-weight:700; text-transform:uppercase;">Phone</div><div>${c.phone}</div></div>
          <div><div style="font-size:0.75rem; color:var(--text-light); font-weight:700; text-transform:uppercase;">Email</div><div style="font-size:0.85rem;">${c.email}</div></div>
        </div>
        <div style="margin-bottom:12px;"><div style="font-size:0.75rem; color:var(--text-light); font-weight:700; text-transform:uppercase; margin-bottom:4px;">Address</div><div>${c.address}</div></div>
        <div style="margin-bottom:12px;"><div style="font-size:0.75rem; color:var(--text-light); font-weight:700; text-transform:uppercase; margin-bottom:4px;">Location of Concern</div><div>${c.location}</div></div>
        <div style="margin-bottom:12px;"><div style="font-size:0.75rem; color:var(--text-light); font-weight:700; text-transform:uppercase; margin-bottom:4px;">Description</div><div style="background:var(--light-gray); padding:12px; border-radius:8px; font-size:0.88rem; line-height:1.6;">${c.description}</div></div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <div>${getPriorityBadge(c.urgency)}</div>
          <div>${getStatusBadge(c.status)}</div>
        </div>
      `;
      document.getElementById('detail-modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('detail-modal').classList.add('hidden');
      currentId = null;
    }

    function updateStatus() {
      const newStatus = document.getElementById('modal-status').value;
      const list = getComplaints();
      const idx = list.findIndex(c => c.id === currentId);
      if (idx > -1) {
        list[idx].status = newStatus;
        const progressMap = { 'Pending Review':25, 'Under Review':40, 'In Progress':65, 'Resolved':100, 'Closed':100 };
        list[idx].progress = progressMap[newStatus] || 25;
        saveComplaints(list);
        renderTable();
        updateStats();
        closeModal();
        // Flash confirmation
        const flash = document.createElement('div');
        flash.className = 'alert alert-success';
        flash.style.cssText = 'position:fixed; top:80px; right:24px; z-index:999; max-width:300px;';
        flash.innerHTML = '<span>✅</span> Status updated successfully!';
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 3000);
      }
    }

    document.getElementById('detail-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // Init
    updateStats();
    renderTable();
  </script>
</body>
</html>
