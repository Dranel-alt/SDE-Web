<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Services | e-Reklamo Barangay Lapasan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
  <div id="navbar"></div>

  <section style="padding: 64px 48px; text-align:center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size:2rem; font-weight:900; margin-bottom:8px;">Barangay Lapasan Complaint System</h1>
    <p style="color:var(--text-light); margin-bottom:40px;">Convenient and accessible services for all Lapasan residents</p>

    <a href="complaint.html" style="
      display:flex; align-items:center; gap:18px; text-align:left;
      padding:24px 28px; border-radius:16px;
      border:1.5px solid var(--border); background:#fff;
      box-shadow:var(--shadow); cursor:pointer; transition:box-shadow 0.2s;
      text-decoration:none; max-width:520px; margin:0 auto;
    ">
      <div style="width:56px; height:56px; background:var(--primary); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:1.6rem; flex-shrink:0;">📋</div>
      <div>
        <div style="font-weight:800; font-size:1.05rem; margin-bottom:4px; color:var(--text-dark);">File your complaint.</div>
        <div style="font-size:0.88rem; color:var(--text-light); line-height:1.5;">Submit and track your complaints and concerns online with ease and transparency.</div>
      </div>
    </a>
  </section>

  <div id="footer"></div>
  <script src="../js/components.js"></script>
</body>
</html>
