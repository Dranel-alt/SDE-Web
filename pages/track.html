<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Track Complaint | e-Reklamo Barangay Lapasan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .track-page { max-width:680px; margin:0 auto; padding:48px 24px 80px; }
    .track-hero { text-align:center; margin-bottom:36px; }
    .track-hero .icon { width:80px;height:80px;border-radius:50%;background:var(--primary-bg);border:3px solid var(--primary);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 16px; }
    /* Status steps */
    .status-steps { display:flex; align-items:center; justify-content:center; margin-bottom:24px; flex-wrap:nowrap; gap:0; }
    .ss-item { display:flex; flex-direction:column; align-items:center; flex:1; position:relative; }
    .ss-circle {
      width:40px; height:40px; border-radius:50%; background:#fff;
      border:3px solid var(--border); display:flex; align-items:center; justify-content:center;
      font-size:1rem; z-index:1; position:relative; transition:all 0.4s;
    }
    .ss-item.done .ss-circle   { background:var(--success); border-color:var(--success); }
    .ss-item.active .ss-circle { background:var(--primary); border-color:var(--primary); box-shadow:0 0 0 5px rgba(204,34,0,0.15); }
    .ss-label { font-size:0.7rem; font-weight:800; color:var(--text-light); margin-top:6px; text-align:center; text-transform:uppercase; letter-spacing:0.03em; }
    .ss-item.done .ss-label, .ss-item.active .ss-label { color:var(--text-dark); }
    .ss-line { flex:1; height:3px; background:var(--border); margin: 0 -1px; align-self:center; margin-bottom:22px; transition:background 0.4s; }
    .ss-line.done { background:var(--success); }
    /* Result card */
    .result-card { background:#fff; border-radius:var(--radius-lg); border:1.5px solid var(--border); padding:24px; margin-bottom:16px; box-shadow:var(--shadow); }
    .result-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
    .complaint-id-display { font-size:0.78rem; font-weight:900; color:var(--primary); font-family:monospace; letter-spacing:0.05em; }
  </style>
</head>
<body>
<div id="navbar"></div>
<nav class="breadcrumbs"><a href="../index.html">Home</a><span class="sep">&gt;</span><span>Track Complaint</span></nav>

<main id="main-content" class="page-fade">
<div class="track-page">
  <div class="track-hero">
    <div class="icon"></div>
    <h1 style="font-size:1.8rem;font-weight:900;margin-bottom:8px;">Track Your Complaint</h1>
    <p style="color:var(--text-light);">Enter your Complaint ID or email address to check the real-time status.</p>
  </div>

  <div class="card" style="margin-bottom:24px;">
    <div class="form-group" style="margin-bottom:12px;">
      <label class="form-label" for="track-input">Complaint ID or Email</label>
      <div class="input-icon-wrap">
        
        <input class="form-control" id="track-input" placeholder="e.g. RPT-1234567890 or juan@email.com" onkeydown="if(event.key==='Enter')trackComplaint()"/>
      </div>
    </div>
    <button class="btn btn-primary btn-full" onclick="trackComplaint()">Track Now</button>
    <p style="font-size:0.78rem;color:var(--text-light);text-align:center;margin-top:10px;">Your information is secure and only visible to you and authorized officials.</p>
  </div>

  <div id="track-result"></div>
</div>
</main>

<div id="footer"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabaseConfig.js"></script>
<script src="../js/supabaseClient.js"></script>
<script src="../js/appState.js"></script>
<script src="../js/components.js"></script>
<script src="../js/script.js"></script>
<script>
  // Check URL param
  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (id) { document.getElementById('track-input').value = id; trackComplaint(); }
  });

  async function trackComplaint() {
    const query = document.getElementById('track-input').value.trim().toLowerCase();
    if (!query) { showToast('Please enter a Complaint ID or email.','error'); return; }

    const el = document.getElementById('track-result');
    el.innerHTML = '<div class="skeleton"></div>';

    let found = [];
    try {
      found = (await window.eReklamo.trackComplaints(query)).map(c => ({
        ...c,
        id: c.referenceNo || c.id,
        status: ({submitted:'Pending Review',pending_review:'Pending Review',under_review:'Under Review',assigned:'Under Review',in_progress:'In Progress',resolved:'Resolved',closed:'Closed'})[c.status] || c.status || 'Pending Review',
        progress: c.progress || window.eReklamo.STATUS_PROGRESS[c.status] || 10,
        timeline: (c.history || []).map(item => ({ status: item.status, date: item.created_at || c.dateRaw, note: item.note })),
      }));
    } catch(err) {
      el.innerHTML = `<div class="card" style="text-align:center;padding:40px;"><h3>Tracking failed</h3><p style="color:var(--danger);">${window.eReklamo.escapeHtml(err.message)}</p></div>`;
      return;
    }

    if (!found.length) {
      el.innerHTML = `<div class="card" style="text-align:center;padding:40px;">
        <div style="font-size:2.5rem;margin-bottom:12px;"></div>
        <h3 style="margin-bottom:8px;">No Complaint Found</h3>
        <p style="color:var(--text-light);font-size:0.88rem;">Double-check your Complaint ID or email and try again.<br/>IDs look like: <strong>RPT-1234567890</strong></p>
        <a href="complaint.html" class="btn btn-outline" style="margin-top:16px;">File a New Complaint</a>
      </div>`;
      return;
    }

    const statusOrder = ['Filed','Under Review','In Progress','Resolved'];
    const progressColors = { 'Pending Review':'#FFE4B5', 'Under Review':'#FF9F4A', 'In Progress':'#FFB366', 'Resolved':'#D97706', 'Closed':'#E67C2A' };
    const badgeMap     = { 'Pending Review':'badge-pending','Under Review':'badge-review','In Progress':'badge-progress','Resolved':'badge-resolved','Closed':'badge-closed' };

    el.innerHTML = found.map(c => {
      const cat = getCatMeta(c.category);
      const sla = getSLAInfo(c);
      const currentStep =
        c.status==='Filed'||c.status==='Pending Review' ? 0 :
        c.status==='Under Review' ? 1 :
        c.status==='In Progress'  ? 2 : 3;

      const stepsHtml = `
        <div class="status-steps">
          ${['Filed','Under Review','In Progress','Resolved'].map((s,i)=>{
            const cls = i < currentStep ? 'done' : i===currentStep ? 'active' : '';
            const icon = i < currentStep ? '' : i===0?'':i===1?'':i===2?'':'';
            return `
              ${i>0?`<div class="ss-line ${i<=currentStep?'done':''}"></div>`:''}
              <div class="ss-item ${cls}">
                <div class="ss-circle">${i<currentStep?'<span style="color:#fff;font-weight:900;"></span>':`<span style="${i===currentStep?'color:#fff;':''}">${icon}</span>`}</div>
                <div class="ss-label">${s}</div>
              </div>`;
          }).join('')}
        </div>`;

      // Timeline activity log
      const timeline = c.timeline || [{ status:'Filed', date: c.dateRaw, note:'Complaint submitted.' }];
      const timelineHtml = `
        <div style="margin-top:20px;border-top:1px solid var(--border);padding-top:16px;">
          <div style="font-size:0.78rem;font-weight:800;color:var(--text-light);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;">Activity Log</div>
          <div class="timeline">
            ${timeline.map((t,i) => `
              <div class="timeline-item">
                <div class="timeline-dot ${i===timeline.length-1?'active':'done'}">
                  <span class="td-icon" style="color:${i===timeline.length-1?'#fff':'#fff'};">${i===timeline.length-1?'':''}</span>
                </div>
                <div class="timeline-content">
                  <strong>${t.status}</strong>
                  ${t.note?`<small>${t.note}</small>`:''}
                  <div class="timeline-date">${new Date(t.date).toLocaleString('en-PH',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
                </div>
              </div>`).join('')}
          </div>
        </div>`;

      return `
        <div class="result-card">
          <div class="result-card-header">
            <div>
              <div style="font-size:1rem;font-weight:900;margin-bottom:4px;display:flex;align-items:center;gap:8px;">
                <span style="font-size:1.2rem;">${cat.icon}</span>${c.subject}
              </div>
              <div class="complaint-id-display">${c.id}</div>
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
              <span class="badge ${badgeMap[c.status]||'badge-pending'}">${c.status}</span>
              <span class="sla-badge ${sla.cls}">${sla.label}</span>
            </div>
          </div>

          ${stepsHtml}

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;font-size:0.85rem;">
            <div style="background:var(--light-gray);border-radius:8px;padding:10px;">
              <div style="font-size:0.7rem;color:var(--text-light);font-weight:800;text-transform:uppercase;margin-bottom:2px;">Category</div>
              <div>${c.category}</div>
            </div>
            <div style="background:var(--light-gray);border-radius:8px;padding:10px;">
              <div style="font-size:0.7rem;color:var(--text-light);font-weight:800;text-transform:uppercase;margin-bottom:2px;">Date Filed</div>
              <div>${c.date}</div>
            </div>
            <div style="background:var(--light-gray);border-radius:8px;padding:10px;">
              <div style="font-size:0.7rem;color:var(--text-light);font-weight:800;text-transform:uppercase;margin-bottom:2px;">Urgency</div>
              <div style="text-transform:capitalize;font-weight:700;">${c.urgency}</div>
            </div>
            <div style="background:var(--light-gray);border-radius:8px;padding:10px;">
              <div style="font-size:0.7rem;color:var(--text-light);font-weight:800;text-transform:uppercase;margin-bottom:2px;">Location</div>
              <div> ${c.location}</div>
            </div>
          </div>

          <div style="margin-bottom:16px;">
            <div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:5px;">
              <span style="color:var(--text-light);font-weight:700;">Overall Progress</span>
              <span style="font-weight:900;color:${progressColors[c.status]||'#F59E0B'};">${c.progress}%</span>
            </div>
            <div class="progress-bar-wrap" style="height:10px;">
              <div class="progress-bar" style="width:${c.progress}%;background:${progressColors[c.status]||'#F59E0B'};"></div>
            </div>
          </div>

          ${c.officialNote ? `<div class="alert alert-info" style="margin-bottom:12px;font-size:0.85rem;"><div><strong>Official Note:</strong> ${c.officialNote}</div></div>` : ''}

          ${timelineHtml}

          <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;">
            <button class="btn btn-outline btn-sm" onclick="copyToClipboard('${c.id}',this)">Copy ID</button>
            <button class="btn btn-sm" style="background:var(--light-gray);border:none;" onclick="window.print()">Print</button>
          </div>
        </div>`;
    }).join('');
  }
</script>
</body>
</html>
